<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Edit Expense</h2>

<form method="POST">

    <input type="text" name="category" value="{{ expense[1] }}" required>
    <br><br>

    <input type="number" step="0.01" name="amount" value="{{ expense[2] }}" required>
    <br><br>

    <input type="text" name="description" value="{{ expense[3] }}" required>
    <br><br>

    <button type="submit">Update Expense</button>

</form>

<br>
<a href="/view_expenses">Back</a>

</body>
</html>
